<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Burgos Smart Heatmap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="map"></div>

  <div class="overlay">
    <div class="card">
      <h1>Burgos Smart City</h1>
      <p>Mapa de calor en tiempo real: Empleos, Vivienda y Servicios.</p>
      
      <div class="controls">
        <div class="btn-group">
          <button id="btn-empleo" class="active" onclick="changeMode('empleo')">Empleos</button>
          <button id="btn-vivienda" onclick="changeMode('vivienda')">Vivienda</button>
          <button id="btn-servicios" onclick="changeMode('servicios')">Servicios</button>
        </div>
      </div>

      <div class="legend">
        <div class="legend-bar"></div>
        <div class="legend-labels">
          <span>Baja densidad</span>
          <span>Alta densidad</span>
        </div>
      </div>
    </div>
  </div>

  <div class="status">
    <div class="dot"></div>
    <span id="update-text">Sincronizando datos...</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  
  <script src="app.js"></script>
</body>
</html>
